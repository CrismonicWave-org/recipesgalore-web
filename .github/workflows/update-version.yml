name: Update Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'minor'

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Prevent running on main branch
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "❌ ERROR: Cannot run version update on main branch!"
            echo ""
            echo "This workflow should only run on feature branches."
            echo ""
            echo "Please:"
            echo "  1. Switch to your feature branch in the 'Run workflow' dropdown"
            echo "  2. Re-run this workflow"
            echo ""
            echo "Why? Version bumps need to go through PR review process."
            exit 1
          fi
          echo "✅ Running on branch: ${{ github.ref_name }}"
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Calculate new version
        id: version
        run: |
          # Get current version from package.json
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "📦 Current version: $CURRENT_VERSION"
          
          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
          
          # Bump version based on input
          case "${{ github.event.inputs.bump_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "🚀 New version: $NEW_VERSION"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
      
      - name: Update package.json version
        run: |
          npm version ${{ steps.version.outputs.new_version }} --no-git-tag-version
          echo "✅ Updated package.json to version ${{ steps.version.outputs.new_version }}"
      
      - name: Update version in app footer
        run: |
          echo "📝 Before update:"
          grep "Version" src/app/app.html || echo "Pattern not found"
          
          # Update the version in the footer
          sed -i 's/Version [0-9]\+\.[0-9]\+\.[0-9]\+/Version ${{ steps.version.outputs.new_version }}/g' src/app/app.html
          
          echo "📝 After update:"
          grep "Version" src/app/app.html
          echo "✅ Updated footer to display Version ${{ steps.version.outputs.new_version }}"
      
      - name: Commit version bump
        run: |
          git add package.json package-lock.json src/app/app.html
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}

          Version bump: ${{ github.event.inputs.bump_type }}
          
          Updates:
          - package.json version
          - Footer display version
          
          Ready for PR and release after merge.
          
          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
          
          echo "✅ Committed version bump changes"
      
      - name: Push changes
        run: |
          git push origin HEAD:${{ github.ref_name }}
          echo "✅ Pushed version bump to branch ${{ github.ref_name }}"
      
      - name: Summary
        run: |
          echo "🎉 Version updated successfully!"
          echo ""
          echo "📦 New version: ${{ steps.version.outputs.new_version }}"
          echo "🌿 Branch: ${{ github.ref_name }}"
          echo ""
          echo "Next steps:"
          echo "1. ✅ Create PR to merge this branch to main"
          echo "2. ✅ Review and merge PR"
          echo "3. ✅ Wait for Firebase deployment"
          echo "4. ✅ Smoke test production site"
          echo "5. ✅ Run 'Create Release' workflow to tag and publish release"
